*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#1a1a1a;height:100%;scrollbar-color:#ff0 #000;scrollbar-width:thin}

body{display:flex;justify-content:center;align-items:center;overflow:auto;

.ln{white-space:pre;min-height:1.2em}
#main{max-height:74vh;overflow:auto;padding-right:.2ch}
.dhw{height:2.4em;overflow:hidden}
.dh{display:inline-block;transform:scaleY(2);transform-origin:top left;white-space:pre}
.w{color:#fff}.y{color:#ff0}.c{color:#0ff}.g{color:#0f0}.m{color:#f0f}
.rd{color:#f33}.bl{color:#66f}
.by{background:#0000c8;color:#ff0}.bw{background:#0000c8;color:#fff}
.byy{background:#ff0;color:#000}.bgr{background:#0f0;color:#000}
.bcy{background:#0ff;color:#000}.brd{background:#f00;color:#fff}
span{text-shadow:0 0 5px currentColor}
.by,.bw,.byy,.bgr,.bcy,.brd{text-shadow:none}
.lnk{cursor:pointer}
.lnk:hover{background:#333}
.btn{background:#ff0;color:#000;cursor:pointer;text-shadow:none}
.btn:hover{background:#fff}
#ftx{margin-top:.6em}
#matchlog,.scrollbox{scrollbar-color:#ff0 #000;scrollbar-width:thin}
#matchlog::-webkit-scrollbar,.scrollbox::-webkit-scrollbar{width:10px}
#matchlog::-webkit-scrollbar-track,.scrollbox::-webkit-scrollbar-track{background:#000}

let state=null, cur=300, live=null, kbuf='', viewMD=0, selDiv=1, tableDiv=null;

function genFixtures(teamIdxs){
  const arr=[...teamIdxs],n=arr.length,rounds=[];
  for(let r=0;r<n-1;r++){
    const ms=[];
    for(let i=0;i<n/2;i++){
      const a=arr[i],b=arr[n-1-i];
      ms.push(r%2===0?[a,b]:[b,a]);
    }
    rounds.push(ms);
    arr.splice(1,0,arr.pop());
  }
  return rounds.concat(rounds.map(ms=>ms.map(([h,a])=>[a,h])));
}
function spacedFractions(count){
  const out=[];
  for(let k=1;k<=count;k++)out.push(k/(count+1));
  return out;
}
function buildSchedule(euro){
  const seasonLen=DIVSIZE[myDiv()]*2-2;
  const withPos=[];
  if(myDiv()===1||myDiv()===2)spacedFractions(6).forEach(pos=>withPos.push({e:{t:'C'},pos}));
  if(euro){
    spacedFractions(8).forEach(pos=>withPos.push({e:{t:'E',stage:'LEAGUE'},pos:pos*0.75}));
    withPos.push({e:{t:'E',stage:'PLAYOFF'},pos:0.80});
    withPos.push({e:{t:'E',stage:'QF'},pos:0.86});
    withPos.push({e:{t:'E',stage:'SF'},pos:0.92});
    withPos.push({e:{t:'E',stage:'FINAL'},pos:0.97});
  }
  withPos.sort((a,b)=>a.pos-b.pos);
  const schedule=[];
  let ei=0;
  for(let i=0;i<seasonLen;i++){
    schedule.push({t:'L',md:i});
    const fracHere=(i+1)/seasonLen;
    while(ei<withPos.length&&withPos[ei].pos<=fracHere){schedule.push(withPos[ei].e);ei++;}
  }
  while(ei<withPos.length){schedule.push(withPos[ei].e);ei++;}
  return schedule;
}

  const cut=Math.ceil(sorted.length/2);
  return comp==='UCL'?sorted.slice(0,cut):sorted.slice(cut);
}
function genSquad(str,euro){
  const out=[];
  const mk=(pos,ratOff)=>{
    let name,guard=0;
    do{name=YINIT[rnd(YINIT.length)]+'.'+(euro?sampleSurname(10):sampleSurname(1));}while(out.some(p=>p[0]===name)&&guard++<50);
    out.push([name,pos,clamp(str+ratOff+rnd(7)-3,40,95),18+rnd(15)]);
  };
  for(let i=0;i<2;i++)mk('GK',i===0?0:-6);
  for(let i=0;i<5;i++)mk('DF',i<3?0:-5);
  for(let i=0;i<5;i++)mk('MF',i<3?0:-5);
  for(let i=0;i<4;i++)mk('FW',i<2?0:-5);
  return out;
}
function ensureSquadData(){
  // Clubs with real researched rosters already have TEAMS[i].p populated — leave them alone.
  // Anything still empty (not yet researched) gets a procedurally generated placeholder squad.
  for(let i=DIV2_SIZE;i<N;i++)if(!TEAMS[i].p.length)TEAMS[i].p=genSquad(TEAMS[i].str,true);
}
function simRoundInstant(pairs){
  return pairs.map(([h,a])=>{
    let hs=0,as=0;
    const hAtt=teamAtt(h)+3,hDef=teamDef(h)+3,aAtt=teamAtt(a),aDef=teamDef(a);
    for(let min=0;min<90;min++){
      if(Math.random()<0.0128*Math.pow(hAtt/aDef,1.6))hs++;
      if(Math.random()<0.0108*Math.pow(aAtt/hDef,1.6))as++;
    }
    return {h,a,hs,as};
  });
}
function finishOtherDivisions(){
  otherDivs().forEach(od=>{
    const total=DIVSIZE[od]*2-2,fx=state.fx[od];
    while(state.res[od].length<total)state.res[od].push(simRoundInstant(fx[state.res[od].length]));
  });
}
function syncOtherDivisions(){
  const my=myDiv(),total=DIVSIZE[my]*2-2,myDone=state.res[my].length;
  otherDivs().forEach(od=>{
    const otherTotal=DIVSIZE[od]*2-2;
    const target=Math.round(otherTotal*(myDone/total));
    const fx=state.fx[od];
    while(state.res[od].length<target&&state.res[od].length<otherTotal)
      state.res[od].push(simRoundInstant(fx[state.res[od].length]));
  });
}
function singleMatchWinner(a,b){
  const r=simRoundInstant([[a,b]])[0];
  if(r.hs!==r.as)return r.hs>r.as?a:b;
  return Math.random()<TEAMS[a].str/(TEAMS[a].str+TEAMS[b].str)?a:b;
}
function clubBudget(t){return Math.max(5,Math.round((TEAMS[t].str-55)*3+15));}

function genYouthIntake(){
  const str=TEAMS[state.teamIdx].str,boost=state.facilities.youth-1,div=myDiv();
  const positions=['GK','DF','DF','MF','MF','FW'];
  const n=3+rnd(2)+Math.floor(boost/2);
  const out=[];
  for(let i=0;i<n;i++){
    const pos=pick(positions);
    let name,guard=0;
    do{name=YINIT[rnd(YINIT.length)]+'.'+sampleSurname(div);}while(out.some(p=>p.name===name)&&guard++<50);
    const rat=clamp(str-22+rnd(9)+boost*2,38,70);
    const potential=clamp(rat+8+rnd(18)+boost*3,rat+5,95);
    out.push({name,pos,rat,potential,age:15+rnd(3)});
  }
  return out;
}
function promoteYouth(idx){

function goldenBoot(){
  let best=null,g=0;
  state.squads.forEach((sq,t)=>sq.forEach(p=>{
    if(p.goals>g){g=p.goals;best=p.name+' ('+TEAMS[t].c+') '+g;}}));

}
function computeTarget(){
  const div=myDiv(),rivals=divTeams(div),sz=DIVSIZE[div],top=TOPFLIGHT_DIVS.includes(div);
  const rank=1+rivals.filter(i=>TEAMS[i].str>TEAMS[state.teamIdx].str).length;
  if(rank<=Math.ceil(sz*0.15))return{label:top?'WIN THE TITLE':'WIN PROMOTION',max:top?3:6};
  if(rank<=Math.ceil(sz*0.4))return{label:top?'EUROPEAN FOOTBALL':'PUSH FOR THE PLAY-OFFS',max:top?7:10};
  if(rank<=Math.ceil(sz*0.75))return{label:'A MID-TABLE FINISH',max:Math.ceil(sz*0.75)};
  return{label:top?'A LOWER-MID FINISH':'AVOID RELEGATION',max:top?sz:sz-3};
}
function computeTOTS(div){
  const pool=divTeams(div),cands=[];
  pool.forEach(t=>state.squads[t].forEach(p=>
    cands.push({name:p.name,pos:p.pos,club:TEAMS[t].c,score:p.rat+p.goals*1.5})));
  const top=(pos,n)=>cands.filter(c=>c.pos===pos).sort((a,b)=>b.score-a.score).slice(0,n);
  return[...top('GK',1),...top('DF',4),...top('MF',4),...top('FW',2)]
    .map(c=>({name:c.name,pos:c.pos,club:c.club}));
}
function computePlayerOfSeason(div){
  let best=null,bestScore=-1;
  divTeams(div).forEach(t=>state.squads[t].forEach(p=>{
    const sc=p.rat+p.goals*1.3+(p.assists||0)*0.8;
    if(sc>bestScore){bestScore=sc;best={name:p.name,club:TEAMS[t].c};}
  }));
  return best;
}
function computeBallonDor(){
  let best=null,bestScore=-1;
  allClubIdxs().forEach(t=>{
    const topFlightBonus=TOPFLIGHT_DIVS.includes(state.div[t])?1:0.75;
    state.squads[t].forEach(p=>{
      const sc=(p.rat+p.goals*1.6+(p.assists||0)*0.9)*topFlightBonus;
      if(sc>bestScore){bestScore=sc;best={name:p.name,club:TEAMS[t].c};}
    });
  });
  return best;
}
function computeManagerOfSeason(){
  let best=null,bestScore=-Infinity;
  allDivIds().forEach(div=>{
    const tab=table(div),teams=divTeams(div);
    tab.forEach((row,idx)=>{
      const t=row.i;
      const expectedRank=1+teams.filter(i=>TEAMS[i].str>TEAMS[t].str).length;
      const overachievement=expectedRank-(idx+1);
      if(overachievement>bestScore){bestScore=overachievement;best=t;}
    });
  });
  return best;
}
function playerWage(p){return Math.max(1,Math.round(val(p)*0.08));}
function totalWageBill(){return mySquad().reduce((s,p)=>s+playerWage(p),0);}
function renewContract(i){

}
function updatePlayerHappiness(){

  sq.forEach((p,i)=>{
    if(p.rat<80||state.lineup.includes(i)||p.inj||p.sus||(p.happyCooldown&&state.sp<p.happyCooldown)){p.unhappy=0;return;}

    }
  }
}

function newSeason(){
  const wasDiv=myDiv(),pos=myPos(wasDiv),wonCup=state.cup.winner===state.teamIdx;
  state.news=[];
  let qualifiesEuro=null;
  if(TOPFLIGHT_DIVS.includes(wasDiv)){
    if(pos<=4)qualifiesEuro='UCL';
    else if(pos===5||(wonCup&&pos<=8))qualifiesEuro='UEL';
  }
  const potd=computePlayerOfSeason(wasDiv),bdor=computeBallonDor(),mgrIdx=computeManagerOfSeason();
  state.honours.push({s:state.season,team:TEAMS[state.teamIdx].c,div:wasDiv,pos,
    champ:TEAMS[table(wasDiv)[0].i].c,
    cup:wonCup?'WON':state.cup.out?'OUT':'-',
    euro:state.euro?(state.euro.comp+' '+(state.euro.result||state.euro.stage)):'-',
    gb:goldenBoot(),
    potd:potd?potd.name+' ('+potd.club+')':'-',
    bdor:bdor?bdor.name+' ('+bdor.club+')':'-',
    mgr:mgrIdx!=null?TEAMS[mgrIdx].n:'-'});
  if(potd)addNews(potd.name+' ('+potd.club+') NAMED '+DIVNAME[wasDiv]+' PLAYER OF THE SEASON');
  if(bdor)addNews(bdor.name+' ('+bdor.club+') WINS THE BALLON D’OR');
  if(mgrIdx!=null){
    addNews(TEAMS[mgrIdx].n+' MANAGER NAMED MANAGER OF THE SEASON');
    if(mgrIdx===state.teamIdx){
      addNews('YOU ARE NAMED MANAGER OF THE SEASON!');
      state.rep=clamp(state.rep+10,0,99);state.conf=clamp(state.conf+10,0,100);
    }
  }
  state.tots=computeTOTS(wasDiv);
  if(state.target){
    const hitTarget=pos<=state.target.max;
    state.rep=clamp(state.rep+(hitTarget?5:-5),0,99);
    state.conf=clamp(state.conf+(hitTarget?8:-8),0,100);
    addNews((hitTarget?'BOARD TARGET MET: ':'BOARD TARGET MISSED: ')+state.target.label);
  }
  state.rep=clamp(state.rep+clamp(15-pos,-3,10)+(wonCup?8:0)+(pos===1?15:0),0,99);
  state.budget+=Math.round(10+(DIVSIZE[wasDiv]+1-pos)*2);
  state.season++;state.offer=null;

  // ---- resolve the pyramid: promotion & relegation for both divisions ----
  finishOtherDivisions();
  const d1tab=table(1),d2tab=table(2);
  // Community Shield: last season's champions vs cup winners, curtain-raiser for the new season
  const champ1=d1tab[0].i,cupWinner=state.cup.winner;
  if(cupWinner!=null&&champ1!==cupWinner){
    const shieldWinner=singleMatchWinner(champ1,cupWinner);
    addNews(TEAMS[shieldWinner].n+' WIN THE COMMUNITY SHIELD');
    if(shieldWinner===state.teamIdx){state.budget+=3;state.rep=clamp(state.rep+2,0,99);}
  }
  const relegatedFromD1=d1tab.slice(-3).map(r=>r.i);
  const autoUp=d2tab.slice(0,2).map(r=>r.i);
  const playoffTeams=d2tab.slice(2,6).map(r=>r.i);
  const sf1w=singleMatchWinner(playoffTeams[0],playoffTeams[3]);
  const sf2w=singleMatchWinner(playoffTeams[1],playoffTeams[2]);
  const finalWin=singleMatchWinner(sf1w,sf2w);
  const relegatedFromD2=d2tab.slice(-3).map(r=>r.i);

  relegatedFromD1.forEach(i=>{addNews(TEAMS[i].n+' RELEGATED FROM THE PREMIER LEAGUE');state.div[i]=2;});
  autoUp.forEach(i=>{addNews(TEAMS[i].n+' PROMOTED TO THE PREMIER LEAGUE');state.div[i]=1;});
  state.div[finalWin]=1;
  addNews(TEAMS[finalWin].n+' WIN THE PLAY-OFF FINAL - PROMOTED!');
  if(playoffTeams.includes(state.teamIdx)){
    if(finalWin===state.teamIdx)addNews(TEAMS[state.teamIdx].n+' PROMOTED VIA THE PLAY-OFFS!');
    else if(sf1w===state.teamIdx||sf2w===state.teamIdx)addNews(TEAMS[state.teamIdx].n+' LOSE THE PLAY-OFF FINAL - HEARTBREAK');
    else addNews(TEAMS[state.teamIdx].n+' OUT OF THE PLAY-OFFS AT THE SEMI-FINAL');
  }
  let userRelegatedToL1=false;
  const l1Draw=[...L1_POOL].sort(()=>Math.random()-.5);
  relegatedFromD2.forEach(i=>{
    if(i===state.teamIdx){userRelegatedToL1=true;return;}
    const old=TEAMS[i].n,[nn,cc,ss]=l1Draw.pop()||pick(L1_POOL);
    TEAMS[i].n=nn;TEAMS[i].c=cc;TEAMS[i].str=ss;TEAMS[i].p=genSquad(ss,false);
    state.squads[i]=TEAMS[i].p.map(([name,pos,rat,age])=>({name,pos,rat,form:0,goals:0,assists:0,inj:0,sus:0,age,listed:false,loanListed:false,yellows:0,contract:1+rnd(4)}));
    state.div[i]=2;
    addNews(old+' RELEGATED TO LEAGUE ONE - REPLACED BY '+nn);
  });

  // loan spells end at the close of the season
  mySquad().slice().forEach(p=>{
    if(p.onLoanFrom==null)return;
    const from=p.onLoanFrom,idx=mySquad().indexOf(p);
    mySquad().splice(idx,1);
    delete p.onLoanFrom;
    state.squads[from].push(p);
    addNews(p.name+' RETURNS TO '+TEAMS[from].n+' FROM LOAN');
  });
  state.loans.out.forEach(p=>{
    mySquad().push(p);
    addNews(p.name+' RETURNS FROM LOAN');
  });
  state.loans.out=[];

  // ageing, development, retirements, youth intake, contract expiry
  const retired=[],departedFree=[];
  state.squads.forEach((sq,ti)=>{
    for(let i=sq.length-1;i>=0;i--){
      const p=sq[i];
      p.age++;
      const trainBoost=ti===state.teamIdx?Math.floor((state.facilities.training-1)/2):0;
      if(p.age<=23)p.rat=clamp(p.rat+rnd(3)+trainBoost,40,95);
      else if(p.age<=29)p.rat=clamp(p.rat+rnd(3)-1+trainBoost,40,95);
      else p.rat=clamp(p.rat-rnd(3)+Math.floor(trainBoost/2),40,95);
      p.contract=(p.contract||1)-1;
      if(p.age>=35||(p.age>=33&&p.rat<62&&Math.random()<0.5)){
        if(ti===state.teamIdx)retired.push(p.name);
        sq[i]=youth(p.pos,TEAMS[ti].str,sq,ti===state.teamIdx?state.facilities.youth-1:0,state.div[ti]);
        continue;
      }
      if(p.contract<=0){
        if(sq.length<=13){
          p.contract=2+rnd(3); // squad too thin to lose anyone right now — re-sign instead
        }else if(ti===state.teamIdx){
          departedFree.push(p.name);
          sq.splice(i,1);
        }else if(Math.random()<0.3){
          sq.splice(i,1);
          state.freeAgents.push({name:p.name,pos:p.pos,rat:clamp(p.rat-3,40,90),age:p.age});
          if(state.freeAgents.length>15)state.freeAgents.shift();
        }else p.contract=2+rnd(3);
      }
    }
    sq.forEach(p=>{p.goals=0;p.assists=0;p.form=0;p.inj=0;p.sus=0;p.yellows=0;});
  });
  retired.forEach(n=>addNews(n+' RETIRES. YOUTH PROMOTED'));
  departedFree.forEach(n=>addNews(n+' LEAVES ON A FREE TRANSFER - CONTRACT EXPIRED'));

  if(userRelegatedToL1){
    state.sacked=true;
    addNews(TEAMS[state.teamIdx].n+' RELEGATED TO LEAGUE ONE - MANAGER SACKED');
    save();go(300);return;
  }

  (state.youth||[]).forEach(y=>y.age++);
  state.youth=(state.youth||[]).filter(y=>y.age<=19);
  const intake=genYouthIntake();
  state.youth=state.youth.concat(intake);
  addNews('YOUTH INTAKE DAY: '+intake.length+' NEW PROSPECTS JOIN THE ACADEMY');

  state.fx={};state.res={};
  allDivIds().forEach(d=>{state.fx[d]=genFixtures(divTeams(d));state.res[d]=[];});
  state.cup=initCup();
  state.target=computeTarget();
  addNews('BOARD TARGET THIS SEASON: '+state.target.label);

  if(qualifiesEuro){
    const pool=euroPool(qualifiesEuro);
    const opponents=[...pool].sort(()=>Math.random()-.5).slice(0,8);
    state.euro={comp:qualifiesEuro,opponents,played:[],pts:0,stage:'LEAGUE',
      direct:false,eliminated:false,koOpp:null,koHome:false,result:null};
    const fee=qualifiesEuro==='UCL'?20:10;
    state.budget+=fee;
    addNews(TEAMS[state.teamIdx].n+' QUALIFY FOR THE '+(qualifiesEuro==='UCL'?'CHAMPIONS LEAGUE':'EUROPA LEAGUE')+'! (+£'+fee+'M)');
  }else state.euro=null;

  state.schedule=buildSchedule(!!state.euro);
  state.sp=0;
  state.conf=clamp(state.conf,40,80);state.rejected={};
  autoPick();refreshListings();refreshLoanListings();live=null;save();go(300);
}

function exportSave(){
  if(!state)return;
  const blob=new Blob([JSON.stringify(state)],{type:'application/json'});
  const url=URL.createObjectURL(blob);

function autoPick(){
  const sq=mySquad(),idxs=sq.map((_,i)=>i);
  const [d,m,f]=FORMS[state.formation]||FORMS['442'];
  const byPos=pos=>idxs.filter(i=>sq[i].pos===pos&&avail(sq[i]))
                      .sort((a,b)=>eff(sq[b])-eff(sq[a]));
  state.lineup=[...byPos('GK').slice(0,1),...byPos('DF').slice(0,d),
                ...byPos('MF').slice(0,m),...byPos('FW').slice(0,f)];
  // top up with best fit remaining players if positions ran dry
  const rest=idxs.filter(i=>avail(sq[i])&&!state.lineup.includes(i))
                 .sort((a,b)=>eff(sq[b])-eff(sq[a]));
  while(state.lineup.length<11&&rest.length)state.lineup.push(rest.shift());
}
function lineupOK(){
  const sq=mySquad(),sel=state.lineup.map(i=>sq[i]);
  const [d,m,f]=FORMS[state.formation]||FORMS['442'];
  const cnt=pos=>sel.filter(p=>p.pos===pos).length;
  return sel.length===11&&sel.every(avail)
    &&cnt('GK')===1&&cnt('DF')===d&&cnt('MF')===m&&cnt('FW')===f;
}

    for(const [f,d] of seq){

    }
  }catch(e){}

function val(p){
  const base=Math.pow(Math.max(1,p.rat-55),2)*0.08;
  const f=p.age<=23?1.35:p.age<=28?1:p.age<=31?0.7:0.45;
  return Math.max(1,Math.round(base*f));
}

  const janStart=Math.round(total*0.45),janEnd=Math.round(total*0.55);
  return {total,md,summerEnd,janStart,janEnd,

}

// ---------- transfer market ----------
let marketClub=null,scoutDiv=null,classPage=0,marketPage=0,loanMarketPage=0,contractsPage=0;
function allListedPlayers(){
  const out=[];
  allClubIdxs().forEach(t=>{
    if(t===state.teamIdx)return;
    state.squads[t].forEach((p,idx)=>{if(p.listed)out.push({t,idx,p});});
  });
  out.sort((a,b)=>b.p.rat-a.p.rat);
  return out;
}
function clubAppeal(t){
  const d=state.div[t];
  let a=TEAMS[t].str+(TOPFLIGHT_DIVS.includes(d)?15:0);
  const pos=table(d).findIndex(r=>r.i===t)+1;
  if(pos>0)a+=clamp(10-pos,-6,8);
  return a;
}
function willingness(p,fromClub,toClub){
  const diff=clubAppeal(fromClub)-clubAppeal(toClub);
  let w=0.5-diff*0.04;
  if(p.age>=31)w+=0.12;
  if(p.age<=21)w-=0.08;
  return clamp(w,0.02,0.9);
}
function effectiveWillingness(p,fromClub){
  return clamp(willingness(p,fromClub,state.teamIdx)+(p.listed?0.12:0),0.02,0.93);
}
function viewClub(t){marketClub=t;pend=null;msg='';render();}
function backToClubs(){marketClub=null;pend=null;msg='';render();}
// listed players are ones their club is actively trying to move on — discounted, and keener to go
function listDiscount(p){
  const age=clamp((p.age-24)*0.018,0,0.22);
  return clamp(0.10+age,0.08,0.4);
}
function askingPrice(t,p){
  const base=Math.round(val(p)*1.1);
  return p.listed?Math.max(1,Math.round(base*(1-listDiscount(p)))):base;
}
function refreshListings(){
  const pool=allClubIdxs();
  pool.forEach(t=>{
    if(t===state.teamIdx)return;
    const sq=state.squads[t];
    const byRat=[...sq].sort((a,b)=>b.rat-a.rat);
    sq.forEach(p=>{
      if(p.listed){if(Math.random()<0.15)p.listed=false;return;}
      const rank=byRat.indexOf(p);
      if(rank<3)return; // clubs don't willingly sell their best players
      let bias=(p.age>=30?0.05:0.01)+(p.rat<TEAMS[t].str-8?0.03:0);
      if(rank>=sq.length-4)bias+=0.02; // fringe squad players move on more readily
      if(Math.random()<bias)p.listed=true;
    });
  });
}
function refreshLoanListings(){
  const pool=allClubIdxs();
  pool.forEach(t=>{
    if(t===state.teamIdx)return;
    const sq=state.squads[t];
    if(sq.length<=13)return; // too thin to spare anyone on loan
    const byRat=[...sq].sort((a,b)=>b.rat-a.rat);
    sq.forEach(p=>{
      if(p.onLoanFrom!=null)return; // already out on loan, can't be loaned again
      if(p.loanListed){if(Math.random()<0.2)p.loanListed=false;return;}
      const rank=byRat.indexOf(p);
      if(p.age<=23&&rank>=3&&Math.random()<0.04)p.loanListed=true;
    });
  });
}
function loanOut(i){
  if(!windowOpen()){msg='TRANSFER WINDOW CLOSED';render();return;}
  const sq=mySquad(),p=sq[i];if(!p)return;
  if(state.lineup.includes(i)){msg='CANNOT LOAN OUT A FIRST-TEAM REGULAR';render();return;}
  if(sq.length<=11){msg='SQUAD TOO THIN TO LOAN ANYONE OUT';render();return;}
  const fee=Math.max(1,Math.round(val(p)*0.15));
  state.budget+=fee;
  state.loans.out.push(p);
  const k=state.lineup.indexOf(i);if(k>=0)state.lineup.splice(k,1);
  state.lineup=state.lineup.map(j=>j>i?j-1:j);
  sq.splice(i,1);
  msg=p.name+' LOANED OUT FOR THE SEASON (+£'+fee+'M)';
  addNews(p.name+' JOINS ON LOAN FOR THE REST OF THE SEASON');
  save();render();
}
function loanIn(t,idx){
  if(!windowOpen()){msg='TRANSFER WINDOW CLOSED';render();return;}
  const sq=state.squads[t],p=sq[idx];if(!p||!p.loanListed)return;
  if(mySquad().length>=20){msg='SQUAD FULL (MAX 20)';render();return;}
  if(sq.length<=12){msg=TEAMS[t].n+' CAN’T LOAN OUT - SQUAD TOO THIN';render();return;}
  const fee=Math.max(1,Math.round(val(p)*0.2));
  if(state.budget<fee){msg='NOT ENOUGH FUNDS';render();return;}
  state.budget-=fee;
  sq.splice(idx,1);
  mySquad().push({...p,onLoanFrom:t,loanListed:false});
  msg=p.name+' JOINS ON LOAN FOR £'+fee+'M';
  addNews(p.name+' JOINS '+TEAMS[state.teamIdx].n+' ON LOAN');
  save();render();
}
function sellPrice(p){
  const fair=Math.max(1,Math.round(val(p)));
  if(p.boughtFor!=null&&state.sp-p.boughtSp<8)return Math.max(1,Math.min(fair,p.boughtFor));
  return fair;
}
function attemptSign(t,name,key){
  const sq=state.squads[t],p=sq.find(x=>x.name===name);if(!p)return;
  if(!windowOpen()){msg='TRANSFER WINDOW CLOSED';pend=null;render();return;}
  const cost=askingPrice(t,p);
  if(mySquad().length>=20){msg='SQUAD FULL (MAX 20)';pend=null;render();return;}
  if(sq.length<=12){msg=TEAMS[t].n+' WON’T SELL - SQUAD TOO THIN';pend=null;render();return;}
  if(state.budget<cost){msg='NOT ENOUGH FUNDS';pend=null;render();return;}
  const rk=t+':'+name;
  state.rejected=state.rejected||{};
  if(state.rejected[rk]&&state.sp<state.rejected[rk]){
    msg=p.name+' STILL WON’T TALK TO YOU';pend=null;render();return;
  }
  if(pend!==key){pend=key;msg='';render();return;}
  const w=effectiveWillingness(p,t);
  if(Math.random()>w){
    state.rejected[rk]=state.sp+6;
    pend=null;msg=p.name+' TURNS DOWN THE MOVE';
    save();render();return;
  }
  state.budget-=cost;
  sq.splice(sq.indexOf(p),1);
  mySquad().push({name:p.name,pos:p.pos,rat:p.rat,form:0,goals:p.goals,assists:p.assists||0,inj:0,sus:0,age:p.age,
    listed:false,loanListed:false,yellows:0,boughtFor:cost,boughtSp:state.sp,contract:3+rnd(3)});
  pend=null;msg=p.name+' SIGNED FOR £'+cost+'M!';
  addNews(p.name+' SIGNS FOR '+TEAMS[state.teamIdx].n+' (£'+cost+'M)');
  save();render();
}
function approachPlayer(t,idx){
  const sq=state.squads[t],p=sq[idx];if(!p)return;
  attemptSign(t,p.name,'a'+t+':'+idx);
}
function canSell(i){
  const sq=mySquad();if(sq.length<=11)return false;
  const cnt=pos=>sq.filter((p,j)=>j!==i&&p.pos===pos).length;
  return cnt('GK')>=1&&cnt('DF')>=3&&cnt('MF')>=2&&cnt('FW')>=1;
}
function sell(i){
  if(!windowOpen()){msg='TRANSFER WINDOW CLOSED';pend=null;render();return;}
  const sq=mySquad(),p=sq[i];if(!p)return;
  if(!canSell(i)){msg='CANNOT SELL - SQUAD TOO THIN';pend=null;render();return;}
  if(pend!=='s'+i){pend='s'+i;msg='';render();return;}
  const fee=sellPrice(p);
  state.budget+=fee;
  const k=state.lineup.indexOf(i);if(k>=0)state.lineup.splice(k,1);
  state.lineup=state.lineup.map(j=>j>i?j-1:j);
  sq.splice(i,1);
  // the player joins a new club rather than vanishing — and can't be immediately re-signed
  const pool=allClubIdxs().filter(t=>t!==state.teamIdx);
  const dest=pick(pool);
  const moved={...p,listed:false,loanListed:false,onLoanFrom:undefined,boughtFor:undefined,boughtSp:undefined};
  state.squads[dest].push(moved);
  state.rejected=state.rejected||{};
  state.rejected[dest+':'+p.name]=state.sp+10;
  pend=null;msg=p.name+' SOLD FOR £'+fee+'M';
  addNews(TEAMS[state.teamIdx].c+' CASH IN: '+p.name+' SOLD TO '+TEAMS[dest].n+' (£'+fee+'M)');
  save();render();
}

function teamAtt(t){
  if(t===state.teamIdx){
    const sq=mySquad(),sel=state.lineup.map(i=>sq[i]);
    const off=sel.filter(p=>p.pos==='MF'||p.pos==='FW');
    let v=off.reduce((s,p)=>s+eff(p),0)/Math.max(1,off.length);
    if(state.tactic==='ATT')v*=1.10;if(state.tactic==='DEF')v*=0.90;
    return v;
  }
  return TEAMS[t].str+rnd(9)-4;
}
function teamDef(t){
  if(t===state.teamIdx){
    const sq=mySquad(),sel=state.lineup.map(i=>sq[i]);
    const d=sel.filter(p=>p.pos==='GK'||p.pos==='DF');
    let v=d.reduce((s,p)=>s+eff(p),0)/Math.max(1,d.length);
    if(state.tactic==='ATT')v*=0.90;if(state.tactic==='DEF')v*=1.10;
    return v;
  }
  return TEAMS[t].str+rnd(9)-4;
}

// ---------- league table ----------
function table(div){
  div=div||myDiv();
  const idxs=divTeams(div),rowOf={};
  const rows=idxs.map(i=>{const r={i,p:0,w:0,d:0,l:0,f:0,a:0,pts:0};rowOf[i]=r;return r;});
  const results=state.res[div]||[];
  for(const round of results)for(const m of round){
    const H=rowOf[m.h],A=rowOf[m.a];
    if(!H||!A)continue;
    H.p++;A.p++;H.f+=m.hs;H.a+=m.as;A.f+=m.as;A.a+=m.hs;
    if(m.hs>m.as){H.w++;H.pts+=3;A.l++;}
    else if(m.hs<m.as){A.w++;A.pts+=3;H.l++;}
    else{H.d++;A.d++;H.pts++;A.pts++;}
  }
  rows.sort((x,y)=>y.pts-x.pts||(y.f-y.a)-(x.f-x.a)||y.f-x.f);
  return rows;
}
function myPos(div){div=div||myDiv();return table(div).findIndex(r=>r.i===state.teamIdx)+1;}

// ---------- schedule / cup / news ----------
function curMd(){return state.res[myDiv()].length;}
function curEntry(){
  while(state.sp<state.schedule.length){
    const e=state.schedule[state.sp];
    if(e.t==='E'){
      if(!state.euro||state.euro.stage==='DONE'){state.sp++;continue;}
      if(e.stage!==state.euro.stage){state.sp++;continue;}
    }
    return e;
  }
  return null;
}
function cupLabel(){
  const a=state.cup.alive.length;
  return a<=2?'FINAL':a<=4?'SEMI-FINAL':a<=8?'QUARTER-FINAL':'ROUND '+(state.cup.round+1);
}
function drawCup(){
  const c=state.cup;if(c.ties)return;
  const pool=[...c.alive].sort(()=>Math.random()-.5);
  c.bye=pool.length%2?pool.pop():null;
  c.ties=[];
  for(let i=0;i<pool.length;i+=2)c.ties.push({h:pool[i],a:pool[i+1]});
  save();
}
function addNews(s){
  state.news.unshift('MD'+curMd()+': '+s);
  state.news=state.news.slice(0,24);
}
function aiTransfer(){
  if(!windowOpen())return;
  if(Math.random()>=0.35)return;
  const pool=allClubIdxs();
  const from=pick(pool),to=pick(pool);
  if(from===to||from===state.teamIdx||to===state.teamIdx)return;
  const sq=state.squads[from];if(sq.length<=12)return;
  const i=rnd(sq.length),p=sq[i];
  sq.splice(i,1);state.squads[to].push(p);
  addNews(p.name+' JOINS '+TEAMS[to].n+' (£'+Math.round(val(p)*1.1)+'M)');
}
function boardMood(){
  const c=state.conf;
  return c>=80?['DELIGHTED','g']:c>=60?['HAPPY','g']:c>=40?['CONTENT','c']
        :c>=20?['UNEASY','y']:['FURIOUS','rd'];
}

// ---------- match engine ----------
function bestXI(t){
  const sq=state.squads[t];
  const byPos=pos=>sq.filter(p=>p.pos===pos).sort((a,b)=>eff(b)-eff(a));
  return[...byPos('GK').slice(0,1),...byPos('DF').slice(0,4),...byPos('MF').slice(0,4),...byPos('FW').slice(0,2)];
}
function motmBase(p){return 6.0+(eff(p)-65)/25+(Math.random()*0.6-0.3);}
function scorer(t){
  const sq=state.squads[t];
  const pool=(t===state.teamIdx)?state.lineup.map(i=>sq[i]):sq;
  if(!pool.length)return{name:'SUB',pos:'FW',rat:50,goals:0}; // defensive fallback — squad should never truly empty out
  const w=p=>(p.pos==='FW'?6:p.pos==='MF'?2.5:p.pos==='DF'?0.8:0.05)*Math.max(1,p.rat-62);
  let tot=pool.reduce((s,p)=>s+w(p),0),r=Math.random()*tot;
  for(const p of pool){r-=w(p);if(r<=0)return p;}
  return pool[pool.length-1];
}
function bumpRating(p,team,delta){
  if(!live.motmPool)return;
  let entry=live.motmPool.find(e=>e.p===p);
  if(!entry){entry={p,team,rating:motmBase(p)};live.motmPool.push(entry);}
  entry.rating+=delta;
}
function goal(m,home){
  if(home)m.hs++;else m.as++;
  const t=home?m.h:m.a,p=scorer(t);
  p.goals++;
  if(m===live.user){
    const mine=(t===state.teamIdx);
    bumpRating(p,t,2.0);
    let assistName=null;
    if(mine){
      (live.matchScorers=live.matchScorers||[]).push(p.name);
      if(Math.random()<0.75){
        const sq=mySquad();
        const mates=state.lineup.map(i=>sq[i]).filter(q=>q!==p);
        if(mates.length){
          const w=q=>q.pos==='MF'?3:q.pos==='FW'?1.5:q.pos==='DF'?1:0.3;
          const tot=mates.reduce((s,q)=>s+w(q),0);
          let r=Math.random()*tot,assister=mates[mates.length-1];
          for(const q of mates){r-=w(q);if(r<=0){assister=q;break;}}
          assister.assists=(assister.assists||0)+1;
          assistName=assister.name;
          (live.matchAssists=live.matchAssists||[]).push(assistName);
          bumpRating(assister,t,1.0);
        }
      }
    }else{
      const sq=state.squads[t];
      const mates=sq.filter(q=>q!==p);
      if(mates.length&&Math.random()<0.75){
        const w=q=>q.pos==='MF'?3:q.pos==='FW'?1.5:q.pos==='DF'?1:0.3;
        const tot=mates.reduce((s,q)=>s+w(q),0);
        let r=Math.random()*tot,assister=mates[mates.length-1];
        for(const q of mates){r-=w(q);if(r<=0){assister=q;break;}}
        bumpRating(assister,t,1.0);
      }
    }
    beep(mine?[[880,90],[1318,150]]:[[392,100],[262,200]]);
    live.log.push({t:padl(live.min,2)+"' GOAL! "+p.name+(assistName?" (ASST: "+assistName+")":"")+" ("+TEAMS[t].c+") "+m.hs+"-"+m.as,
                   c:mine?'y':'rd'});
  }else{
    live.log.push({t:padl(live.min,2)+"' "+pad(TEAMS[m.h].c,4)+m.hs+"-"+m.as+" "+TEAMS[m.a].c,c:'c'});
  }
}
function drawEuroKO(){
  const eu=state.euro;if(!eu||eu.koOpp!=null)return;
  const basePool=euroPool(eu.comp);
  const pool=basePool.filter(i=>!eu.played.some(pl=>pl.opp===i));
  eu.koOpp=pick(pool.length?pool:basePool);
  eu.koHome=Math.random()<0.5;
  save();
}
function startMatch(){
  if(live&&!live.done)return;
  if(state.sacked)return;
  const e=curEntry();if(!e)return;
  if(!lineupOK())autoPick();
  let pairs,title,isCup=false,isEuro=false;
  if(e.t==='C'){
    isCup=true;drawCup();pairs=state.cup.ties.map(t=>[t.h,t.a]);
    title='CUP '+cupLabel();
  }else if(e.t==='E'){
    isEuro=true;
    const eu=state.euro;
    let opp,home;
    if(e.stage==='LEAGUE'){
      opp=eu.opponents[eu.played.length];home=eu.played.length%2===0;
    }else{
      drawEuroKO();opp=eu.koOpp;home=eu.koHome;
    }
    pairs=home?[[state.teamIdx,opp]]:[[opp,state.teamIdx]];
    title=(eu.comp==='UCL'?'CHAMPIONS LEAGUE ':'EUROPA LEAGUE ')
      +(e.stage==='LEAGUE'?'MATCH '+(eu.played.length+1)+'/8':e.stage);
  }else{
    pairs=state.fx[myDiv()][e.md];
    title='MATCHDAY '+(state.res[myDiv()].length+1);
  }
  const userFx=pairs.find(([h,a])=>h===state.teamIdx||a===state.teamIdx);
  const isRivalry=e.t==='L'&&userFx&&isDerby(userFx[0],userFx[1]);
  live={min:0,done:false,cup:isCup,euro:isEuro,derby:isRivalry,log:[],uAtt:1,uDef:1,paused:false,awaitTalk:false,
    title:isRivalry?'DERBY DAY! '+title:title,
    ms:pairs.map(([h,a])=>({h,a,hs:0,as:0,
      hAtt:teamAtt(h)+3,hDef:teamDef(h)+3,aAtt:teamAtt(a),aDef:teamDef(a)}))};
  live.user=live.ms.find(m=>m.h===state.teamIdx||m.a===state.teamIdx)||null;
  if(!live.user){ // cup round without your team: instant simulation
    while(!live.done)simMinute();
    render();return;
  }
  const oppIdx=live.user.h===state.teamIdx?live.user.a:live.user.h;
  const mySq=mySquad(),myXI=state.lineup.map(i=>mySq[i]);
  live.motmPool=myXI.map(p=>({p,team:state.teamIdx,rating:motmBase(p)}))
    .concat(bestXI(oppIdx).map(p=>({p,team:oppIdx,rating:motmBase(p)})));
  if(state.press){
    const mine=live.user.h===state.teamIdx;
    const selfBoost=state.press==='aggressive'?6:state.press==='confident'?3:0;
    const oppBoost=state.press==='aggressive'?4:0;
    if(mine){live.user.hAtt+=selfBoost;live.user.aAtt+=oppBoost;}
    else{live.user.aAtt+=selfBoost;live.user.hAtt+=oppBoost;}
  }
  live.log.push({t:"KICK OFF",c:'g'});
  startTimer();render();
}
function startTimer(){
  clearInterval(live.timer);
  live.lastT=performance.now();
  live.timer=setInterval(pump,Math.max(16,Math.min(SPEEDS[state.speed]||140,250)));
}
// wall-clock driven so speeds stay honest even in throttled tabs
function pump(){
  if(!live||live.done)return;
  if(live.paused){live.lastT=performance.now();return;}
  const per=SPEEDS[state.speed]||140,now=performance.now();
  let mins=Math.floor((now-live.lastT)/per);
  if(mins<=0)return;
  live.lastT+=mins*per;
  while(mins-->0&&!live.done&&!live.paused)simMinute();
  if(cur===305)renderMainKeepScroll();
}
function refreshUserStr(){
  const m=live.user;if(!m)return;
  const home=m.h===state.teamIdx;
  const ua=teamAtt(state.teamIdx)*live.uAtt,ud=teamDef(state.teamIdx)*live.uDef;
  if(home){m.hAtt=ua+3;m.hDef=ud+3;}else{m.aAtt=ua;m.aDef=ud;}
}
function teamTalk(k){
  if(!live||!live.awaitTalk)return;
  let f=1,txt='CALM WORDS AT THE BREAK';
  if(k===2){f=1.06;txt='FIRED UP FOR THE SECOND HALF';}
  if(k===3){
    if(Math.random()<0.55){f=1.15;txt='HAIRDRYER WORKS! THEY FLY OUT';}
    else{f=0.86;txt='HAIRDRYER BACKFIRES. HEADS DROP';}
  }
  live.uAtt*=f;live.uDef*=Math.sqrt(f);
  refreshUserStr();
  live.log.push({t:"   "+txt,c:f>1?'g':f<1?'rd':'w'});
  live.awaitTalk=false;live.paused=false;
  renderMainKeepScroll();
}
function injureRandom(){
  if(!state.lineup.length)return;
  const sq=mySquad();
  // injury-prone players (repeat customers) are more likely to be the one who goes down
  const weights=state.lineup.map(li=>1+(sq[li].injuryCount||0)*0.6);
  const total=weights.reduce((a,b)=>a+b,0);
  let r=Math.random()*total,k=0;
  while(k<weights.length-1&&r>weights[k]){r-=weights[k];k++;}
  const li=state.lineup[k],p=sq[li];
  p.inj=1+rnd(5);
  p.injuryCount=(p.injuryCount||0)+1;
  state.lineup.splice(k,1);
  live.log.push({t:padl(live.min,2)+"' "+p.name+" INJURED - OFF ("+p.inj+" MD)"+(p.injuryCount>=3?' - INJURY PRONE':''),c:'rd'});
  let sub=-1,best=-1;
  sq.forEach((q,i)=>{
    if(!avail(q)||i===li||state.lineup.includes(i))return;
    if(q.pos===p.pos&&eff(q)>best){best=eff(q);sub=i;}
  });
  if(sub<0)sq.forEach((q,i)=>{
    if(!avail(q)||i===li||state.lineup.includes(i)||q.pos==='GK')return;
    if(eff(q)>best){best=eff(q);sub=i;}
  });
  if(sub>=0){
    state.lineup.push(sub);
    live.log.push({t:"   SUB: "+sq[sub].name+" COMES ON",c:'g'});
  }
  addNews(p.name+' INJURED - OUT '+p.inj+' MATCHES');
  refreshUserStr();
}
function simMinute(){
  live.min++;
  for(const m of live.ms){
    const pH=0.0128*Math.pow(m.hAtt/m.aDef,1.6);
    const pA=0.0108*Math.pow(m.aAtt/m.hDef,1.6);
    if(Math.random()<pH)goal(m,true);
    else if(Math.random()<pA)goal(m,false);
  }
  if(live.user){
    if(Math.random()<0.0025&&state.lineup.length>7)injureRandom();
    // red card for one of yours (once per match)
    if(!live.userRed&&Math.random()<0.0009&&state.lineup.length>8){
      live.userRed=true;
      const sq=mySquad(),k=rnd(state.lineup.length),li=state.lineup[k],p=sq[li];
      p.sus=1+rnd(2);state.lineup.splice(k,1);
      beep([[196,300]]);
      live.log.push({t:padl(live.min,2)+"' RED CARD! "+p.name+" ("+p.sus+" MD BAN)",c:'rd'});
      addNews(p.name+' SEES RED - '+p.sus+' MATCH BAN');
      live.uAtt*=0.82;live.uDef*=0.90;
      refreshUserStr();
    }
    // red card for the opposition (once per match)
    if(!live.oppRed&&Math.random()<0.0009){
      live.oppRed=true;
      const m=live.user,oppIsHome=m.a===state.teamIdx;
      if(oppIsHome){m.hAtt*=0.82;m.hDef*=0.90;}else{m.aAtt*=0.82;m.aDef*=0.90;}
      live.log.push({t:padl(live.min,2)+"' "+TEAMS[oppIsHome?m.h:m.a].c+" DOWN TO 10 MEN!",c:'g'});
    }
    // yellow cards accumulate toward a 5-booking suspension, same as real football
    if(!live.userYellow&&state.lineup.length&&Math.random()<0.02){
      live.userYellow=true;
      const sq=mySquad(),k=rnd(state.lineup.length),li=state.lineup[k],p=sq[li];
      p.yellows=(p.yellows||0)+1;
      live.log.push({t:padl(live.min,2)+"' "+p.name+" BOOKED ("+p.yellows+"/5 THIS SEASON)",c:'y'});
      if(p.yellows>=5){
        p.sus=1;p.yellows=0;
        state.lineup.splice(k,1);
        live.log.push({t:"   SUSPENDED - 5TH BOOKING OF THE SEASON",c:'rd'});
        addNews(p.name+' BANNED AFTER 5TH BOOKING OF THE SEASON');
        refreshUserStr();
      }
    }
    if(Math.random()<0.05){
      const m=live.user,t=Math.random()<0.5?m.h:m.a,p=scorer(t);
      live.log.push({t:padl(live.min,2)+"' "+pick(FLAVOR).replace('{P}',p.name).replace('{T}',TEAMS[t].c),c:'w'});
    }
  }
  if(live.min===45){
    live.log.push({t:"-- HALF TIME --",c:'g'});
    if(live.user){live.paused=true;live.awaitTalk=true;}
  }
  if(live.min>=90){
    clearInterval(live.timer);
    finishMatch();
  }
}
function finishMatch(){
  live.done=true;
  const e=curEntry(),u=live.user;
  const res=!u?null:
    u.h===state.teamIdx?(u.hs>u.as?'WIN':u.hs<u.as?'LOSS':'DRAW')
                       :(u.as>u.hs?'WIN':u.as<u.hs?'LOSS':'DRAW');
  if(u){
    state.career.p++;
    if(res==='WIN')state.career.w++;else if(res==='LOSS')state.career.l++;else state.career.d++;
    state.career.gf+=u.h===state.teamIdx?u.hs:u.as;
    state.career.ga+=u.h===state.teamIdx?u.as:u.hs;
    const hofOf=n=>state.hof[n]=state.hof[n]||{goals:0,assists:0,apps:0};
    state.lineup.forEach(i=>{const pl=mySquad()[i];if(pl)hofOf(pl.name).apps++;});
    (live.matchScorers||[]).forEach(n=>hofOf(n).goals++);
    (live.matchAssists||[]).forEach(n=>hofOf(n).assists++);
  }
  if(e.t==='L'){
    const prize=res==='WIN'?3:res==='DRAW'?1:0;
    const gateReceipts=u.h===state.teamIdx?state.facilities.stadium*2:0;
    const wageCost=Math.round(totalWageBill()/(DIVSIZE[myDiv()]*2-2));
    state.budget+=prize-wageCost+gateReceipts;
    live.log.push({t:"FULL TIME — "+res+(prize?" (+£"+prize+"M)":""),
                   c:res==='WIN'?'g':res==='LOSS'?'rd':'y'});
    if(gateReceipts>0)live.log.push({t:"GATE RECEIPTS: +£"+gateReceipts+"M",c:'g'});
    if(wageCost>0)live.log.push({t:"WAGES PAID: -£"+wageCost+"M",c:'m'});
    state.res[myDiv()].push(live.ms.map(m=>({h:m.h,a:m.a,hs:m.hs,as:m.as})));
    syncOtherDivisions();
    const rivals=divTeams(myDiv());
    const exp=1+rivals.filter(i=>TEAMS[i].str>TEAMS[state.teamIdx].str).length;
    let confDelta=(res==='WIN'?4:res==='DRAW'?0:-4)
      +clamp(Math.round((exp-myPos())/3),-2,2);
    if(live.derby){
      confDelta+=res==='WIN'?3:res==='LOSS'?-3:0;
      live.log.push({t:res==='WIN'?"DERBY DELIGHT!":res==='LOSS'?"DERBY DISASTER":"DERBY DAY STALEMATE",
        c:res==='WIN'?'y':res==='LOSS'?'rd':'w'});
      addNews((res==='WIN'?'DERBY DELIGHT':res==='LOSS'?'DERBY DISASTER':'DERBY STALEMATE')+' FOR '+TEAMS[state.teamIdx].n);
    }
    if(state.press){
      const swing=state.press==='confident'?(res==='WIN'?2:res==='LOSS'?-3:-1)
        :state.press==='aggressive'?(res==='WIN'?3:res==='LOSS'?-5:-1)
        :(res==='WIN'?1:res==='LOSS'?0:0);
      confDelta+=swing;
      live.log.push({t:"PRESS: "+PRESS_LABEL[state.press]+" — "+(swing>=0?"PAID OFF":"BACKFIRED"),
        c:swing>=0?'g':'rd'});
    }
    state.conf=clamp(state.conf+confDelta,0,100);
    state.rep=clamp(state.rep+(res==='WIN'?1:res==='LOSS'?-1:0),0,99);
    // a bigger, struggling club may come calling
    if(!state.offer&&state.rep>45&&Math.random()<0.10){
      const tab=table(),pool=allClubIdxs(),cands=[];
      pool.forEach(i=>{
        const t=TEAMS[i];
        if(i===state.teamIdx||t.str<=TEAMS[state.teamIdx].str+2)return;
        const p=tab.findIndex(r=>r.i===i)+1;if(p<1)return;
        const texp=1+rivals.filter(q=>TEAMS[q].str>t.str).length;
        if(p>=texp+4)cands.push(i);
      });
      if(cands.length){
        state.offer={t:pick(cands),exp:state.sp+3};
        addNews(TEAMS[state.offer.t].n+' WANT YOU AS BOSS! SEE P312');
      }
    }
    const opp=u.h===state.teamIdx?u.a:u.h;
    const sc=u.h===state.teamIdx?u.hs+'-'+u.as:u.as+'-'+u.hs;
    addNews(TEAMS[state.teamIdx].c+' '+sc+' '+TEAMS[opp].c+': '
      +(res==='WIN'?'BOSS DELIGHTED':res==='LOSS'?'FANS GROAN':'HONOURS EVEN'));
    let big=null,bg=-1;
    for(const m of live.ms){if(m===u)continue;if(m.hs+m.as>bg){bg=m.hs+m.as;big=m;}}
    if(big&&bg>=5)addNews('GOALS GALORE: '+TEAMS[big.h].c+' '+big.hs+'-'+big.as+' '+TEAMS[big.a].c);
  }else if(e.t==='C'){
    // resolve the cup round — draws go to penalties
    const c=state.cup,winners=[];
    for(const m of live.ms){
      if(m.hs===m.as){
        m.pw=Math.random()<TEAMS[m.h].str/(TEAMS[m.h].str+TEAMS[m.a].str)?m.h:m.a;
        winners.push(m.pw);
      }else winners.push(m.hs>m.as?m.h:m.a);
    }
    if(c.bye!==null&&c.bye!==undefined)winners.push(c.bye);
    c.hist.push({label:cupLabel(),res:live.ms.map(m=>({h:m.h,a:m.a,hs:m.hs,as:m.as,pw:m.pw}))});
    c.alive=winners;c.ties=null;c.bye=null;c.round++;
    if(u){
      const won=winners.includes(state.teamIdx);
      const pens=u.hs===u.as;
      if(won){
        state.budget+=5;state.conf=clamp(state.conf+5,0,100);
        live.log.push({t:"FULL TIME — THROUGH!"+(pens?" ON PENS!":"")+" (+£5M)",c:'g'});
        if(c.alive.length>1)addNews(TEAMS[state.teamIdx].n+' INTO THE CUP '+cupLabel());
      }else{
        c.out=true;state.conf=clamp(state.conf-3,0,100);
        live.log.push({t:"FULL TIME — OUT OF THE CUP"+(pens?" ON PENS":""),c:'rd'});
        addNews('CUP EXIT FOR '+TEAMS[state.teamIdx].n);
      }
    }
    if(c.alive.length===1){
      c.winner=c.alive[0];
      if(c.winner===state.teamIdx){
        state.budget+=20;state.conf=clamp(state.conf+15,0,100);
        addNews(TEAMS[c.winner].n+' WIN THE TELEBOSS CUP! (+£20M)');
      }else addNews(TEAMS[c.winner].n+' LIFT THE TELEBOSS CUP');
    }
  }else if(e.t==='E'){
    const eu=state.euro,oppI=(u.h===state.teamIdx?u.a:u.h),oppName=TEAMS[oppI].n;
    if(e.stage==='LEAGUE'){
      const pts=res==='WIN'?3:res==='DRAW'?1:0;
      eu.played.push({opp:oppI,pts});
      eu.pts+=pts;
      const money=res==='WIN'?(eu.comp==='UCL'?3:2):res==='DRAW'?1:0;
      state.budget+=money;
      live.log.push({t:"FULL TIME — "+res+(money?" (+£"+money+"M)":""),c:res==='WIN'?'g':res==='LOSS'?'rd':'y'});
      addNews(eu.comp+' '+res+' v '+oppName+' ('+eu.pts+' PTS)');
      if(eu.played.length>=8){
        if(eu.pts>=16){
          eu.stage='QF';eu.direct=true;const fee=eu.comp==='UCL'?10:5;state.budget+=fee;
          addNews(TEAMS[state.teamIdx].n+' GO STRAIGHT TO THE '+eu.comp+' QUARTER-FINALS (+£'+fee+'M)');
        }else if(eu.pts>=10){
          eu.stage='PLAYOFF';
          addNews(TEAMS[state.teamIdx].n+' INTO THE '+eu.comp+' KNOCKOUT PLAY-OFF');
        }else{
          eu.stage='DONE';eu.eliminated=true;eu.result='LEAGUE PHASE';
          addNews(TEAMS[state.teamIdx].n+' OUT OF EUROPE AT THE LEAGUE PHASE');
        }
      }
    }else{
      let win;
      if(u.hs===u.as)win=Math.random()<TEAMS[u.h].str/(TEAMS[u.h].str+TEAMS[u.a].str)?u.h:u.a;
      else win=u.hs>u.as?u.h:u.a;
      const userWon=win===state.teamIdx,pens=(u.hs===u.as);
      const bigWin=eu.comp==='UCL'?6:3,bigFinal=eu.comp==='UCL'?40:20,bigRunnerUp=eu.comp==='UCL'?15:8;
      eu.koOpp=null;
      if(userWon){
        if(e.stage==='FINAL'){
          state.budget+=bigFinal;state.conf=clamp(state.conf+25,0,100);
          state.rep=clamp(state.rep+(eu.comp==='UCL'?25:15),0,99);
          eu.stage='DONE';eu.result='CHAMPION';
          live.log.push({t:"CHAMPIONS!"+(pens?" ON PENS!":"")+" (+£"+bigFinal+"M)",c:'y'});
          addNews(TEAMS[state.teamIdx].n+' WIN THE '+(eu.comp==='UCL'?'CHAMPIONS LEAGUE':'EUROPA LEAGUE')+'!');
        }else{
          const nextStage=e.stage==='PLAYOFF'?'QF':e.stage==='QF'?'SF':'FINAL';
          state.budget+=bigWin;state.conf=clamp(state.conf+8,0,100);
          eu.stage=nextStage;
          live.log.push({t:"THROUGH!"+(pens?" ON PENS!":"")+" (+£"+bigWin+"M)",c:'g'});
          addNews(TEAMS[state.teamIdx].n+' REACH THE '+eu.comp+' '+nextStage);
        }
      }else{
        eu.stage='DONE';eu.result=e.stage==='FINAL'?'RUNNER-UP':e.stage;
        if(e.stage==='FINAL'){state.budget+=bigRunnerUp;state.conf=clamp(state.conf+10,0,100);}
        live.log.push({t:"OUT OF EUROPE"+(pens?" ON PENS":""),c:'rd'});
        addNews(TEAMS[state.teamIdx].n+' KNOCKED OUT OF THE '+eu.comp+' ('+e.stage+')');
      }
    }
  }
  state.sp++;
  if(state.offer&&state.sp>state.offer.exp){state.offer=null;addNews('JOB OFFER WITHDRAWN');}
  for(const sq of state.squads)for(const p of sq){
    p.form=clamp(p.form+rnd(3)-1,-3,3);
    if(p.inj>0)p.inj--;
    if(p.sus>0)p.sus--;
  }
  updatePlayerHappiness();
  aiTransfer();
  rivalManagerNews();
  internationalNews();
  refreshListings();
  refreshLoanListings();
  if(state.conf<=0&&!state.sacked){state.sacked=true;addNews(TEAMS[state.teamIdx].n+' SACK MANAGER');}
  else if(state.conf<=20)addNews('BOARD LOSING PATIENCE AT '+TEAMS[state.teamIdx].c);
  if(u){
    const sh=u.hs*2+1+rnd(9),sa=u.as*2+1+rnd(7);
    const ph=clamp(Math.round(50+(u.hAtt-u.aAtt)*0.8),25,75);
    live.log.push({t:"SHOTS "+sh+"-"+sa+"  POSSESSION "+ph+"-"+(100-ph),c:'c'});
    beep([[660,120],[660,120],[660,320]]);
    const pool=live.motmPool||[];
    const best=pool.length?pool.reduce((a,b)=>b.rating>a.rating?b:a):null;
    if(best){
      best.p.form=clamp(best.p.form+1,-3,3);
      const mine=best.team===state.teamIdx;
      live.log.push({t:"MAN OF THE MATCH: "+best.p.name+(mine?"":" ("+TEAMS[best.team].c+")"),c:'y'});
    }
    live.highlights=live.log.filter(l=>/GOAL!|RED CARD|DOWN TO 10 MEN|MAN OF THE MATCH/.test(l.t)).slice(0,4);
  }
  state.press=null;
  save();
}

        +L(sp(' VENUE: ','w')+sp(home?'HOME':'AWAY',home?'g':'y')
          +sp('   OPPONENT POS: ','w')+sp(String(oppPos),'c'))
        +L(sp(' TACTIC: ','w')+sp(state.tactic,'g')
          +sp('   XI: ','w')+sp(lineupOK()?'READY':'AUTO-PICK AT KO',lineupOK()?'g':'y'))
        +L(sp(' UNAVAILABLE: ','w')+sp(String(nOut),nOut?'rd':'g'))
        +pressBlock()
        +speedRow()
        +BLANK
        +L(sp(' ','w')+`<span class="lnk by" onclick="startMatch()"> ██ KICK OFF ██ </span>`)
        +BLANK+L(sp(' ALL '+(DIVSIZE[div]/2)+' GAMES PLAY SIMULTANEOUSLY','m'));
    }
    if(e.t==='E'){
      const eu=state.euro;
      let opp,home;
      if(e.stage==='LEAGUE'){opp=eu.opponents[eu.played.length];home=eu.played.length%2===0;}
      else{drawEuroKO();opp=eu.koOpp;home=eu.koHome;}
      const compName=eu.comp==='UCL'?'CHAMPIONS LEAGUE':'EUROPA LEAGUE';
      return BLANK+banner(compName,'m')+BLANK
        +L(sp(' '+(e.stage==='LEAGUE'?'LEAGUE PHASE MATCH '+(eu.played.length+1)+'/8':e.stage),'y'))
        +DH(sp(' '+TEAMS[state.teamIdx].c+'  v  '+TEAMS[opp].c+' ','w'))
        +L(sp(' '+padName(TEAMS[state.teamIdx].n,18),'c')+sp(padName(TEAMS[opp].n,18),'c'))+BLANK
        +L(sp(' VENUE: ','w')+sp(home?'HOME':'AWAY',home?'g':'y')

      +L(sp(' VENUE: ','w')+sp(home?'HOME':'AWAY',home?'g':'y')

    h+=BLANK+L(sp(' ','w')+`<span class="lnk by" onclick="live=null;go(${live.cup?317:live.euro?318:304})"> CONTINUE </span>`);
  return h;

function facilityCost(level){return level*25;}
function upgradeFacility(name){
  const lvl=state.facilities[name];
  if(lvl>=5){msg='ALREADY AT MAXIMUM LEVEL';render();return;}
  const cost=facilityCost(lvl);
  if(state.budget<cost){msg='NOT ENOUGH FUNDS';render();return;}
  state.budget-=cost;
  state.facilities[name]=lvl+1;
  msg=name.toUpperCase()+' UPGRADED TO LEVEL '+(lvl+1);
  addNews(TEAMS[state.teamIdx].n+' UPGRADE THEIR '+name.toUpperCase()+' TO LEVEL '+(lvl+1));
  save();render();
}

function ordinal(n){
  const s=n%10===1&&n!==11?'ST':n%10===2&&n!==12?'ND':n%10===3&&n!==13?'RD':'TH';
  return n+s;
}

// ---------- input ----------
document.addEventListener('keydown',e=>{
  if(e.key>='0'&&e.key<='9'){
    kbuf+=e.key;
    if(kbuf.length===3){const p=+kbuf;kbuf='';go(p);}
    renderHdr();
  }else if(e.key==='Escape'){kbuf='';renderHdr();}
});

// ---------- boot ----------
// stretch the CRT horizontally to fill the window (real Ceefax cells were wide)
function fitScreen(){
  const crt=$('crt');
  const sx=Math.max(1,Math.min(2.1,(innerWidth*0.94)/crt.offsetWidth));
  crt.style.transform='scaleX('+sx.toFixed(3)+')';
}
addEventListener('resize',fitScreen);
loadGame();
render();
